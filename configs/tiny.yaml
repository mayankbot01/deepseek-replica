# configs/tiny.yaml
# Tiny model: ~30M parameters  –  fits on a single GPU or even CPU for testing

model:
  size: tiny
  vocab_size: 32000
  hidden_size: 512
  intermediate_size: 1408          # ~2.75x hidden (SwiGLU)
  num_hidden_layers: 8
  num_attention_heads: 8
  num_key_value_heads: 2           # GQA: 4 queries share 1 KV head
  # MLA
  q_lora_rank: 0                   # 0 = disable Q low-rank projection
  kv_lora_rank: 128
  qk_rope_head_dim: 32
  qk_nope_head_dim: 64
  v_head_dim: 64
  # MoE
  use_moe: true
  num_experts: 8
  num_experts_per_token: 2
  num_shared_experts: 1
  moe_intermediate_size: 512
  # Positional
  max_position_embeddings: 2048
  rope_theta: 10000.0
  # Norm & misc
  rms_norm_eps: 1.0e-6
  initializer_range: 0.02
  use_cache: true

training:
  batch_size: 16
  grad_accum_steps: 4              # effective batch = 64
  seq_len: 512
  max_steps: 10000
  warmup_steps: 500
  learning_rate: 3.0e-4
  min_lr: 3.0e-5
  weight_decay: 0.1
  grad_clip: 1.0
  bf16: true
  # Logging
  log_interval: 50
  eval_interval: 500
  save_interval: 1000
  output_dir: checkpoints/tiny/

tokenizer:
  tokenizer_dir: tokenizer_saved/
  vocab_size: 32000
