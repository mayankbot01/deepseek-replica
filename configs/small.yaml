# configs/small.yaml
# Small model: ~2B parameters  –  single A100/H100 80GB recommended

model:
  size: small
  vocab_size: 102400              # DeepSeek-V3 vocabulary
  hidden_size: 2048
  intermediate_size: 5632         # ~2.75x hidden (SwiGLU)
  num_hidden_layers: 28
  num_attention_heads: 16
  num_key_value_heads: 4          # GQA
  # MLA
  q_lora_rank: 768
  kv_lora_rank: 512
  qk_rope_head_dim: 64
  qk_nope_head_dim: 128
  v_head_dim: 128
  # MoE
  use_moe: true
  first_k_dense_replace: 1        # first layer is dense
  num_experts: 64
  num_experts_per_token: 6
  num_shared_experts: 2
  moe_intermediate_size: 1408
  # Positional
  max_position_embeddings: 4096
  rope_theta: 10000.0
  rope_scaling:                   # YaRN for extended context
    type: yarn
    factor: 40
    original_max_position_embeddings: 4096
  # Norm & misc
  rms_norm_eps: 1.0e-6
  initializer_range: 0.006        # scaled init (DeepSeek-V3 style)
  use_cache: true

training:
  batch_size: 4
  grad_accum_steps: 32            # effective batch = 128
  seq_len: 2048
  max_steps: 100000
  warmup_steps: 2000
  learning_rate: 2.2e-4
  min_lr: 2.2e-5
  weight_decay: 0.1
  grad_clip: 1.0
  bf16: true
  # MoE aux loss
  moe_aux_loss_coeff: 1.0e-3
  # Logging
  log_interval: 10
  eval_interval: 1000
  save_interval: 2000
  output_dir: checkpoints/small/

tokenizer:
  tokenizer_dir: tokenizer_saved/
  vocab_size: 102400
